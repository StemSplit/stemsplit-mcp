startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: "StemSplit API key (format: sk_live_...)"
      defaultOutputDir:
        type: string
        description: "Base directory where stems are saved (default: ~/Downloads/stemsplit)"
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "stemsplit-mcp"],
      env: {
        STEMSPLIT_API_KEY: config.apiKey,
        ...(config.defaultOutputDir && { STEMSPLIT_DEFAULT_OUTPUT_DIR: config.defaultOutputDir })
      }
    })
  exampleConfig:
    apiKey: sk_live_your_key_here
